name = "pettypet"
type = "javascript"
workers_dev = true
main = "dist/worker.js"

# Development environment
[env.development]
name = "pettypet-dev"
workers_dev = true

# Production environment
[env.production]
name = "pettypet-prod"
workers_dev = false

# Build configuration
[build]
command = "npm run build"
cwd = "./"

# Environment variables
[env.development.vars]
NODE_ENV = "development"

[env.production.vars]
NODE_ENV = "production"
